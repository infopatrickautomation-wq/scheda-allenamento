let state = { tab:"circuito", giorno:0, aperto:null, pasto:null };
let timerInterval = null;
let timerState = { active: false, secondsLeft: 0 };
let currentTimerKey = null;

function startTimer(seconds, timerKey) {
  if (timerInterval) clearInterval(timerInterval);
  document.querySelectorAll('[id^="itimer-"]').forEach(el => { el.style.display='none'; el.innerHTML=''; });
  currentTimerKey = timerKey;
  timerState = { active: true, secondsLeft: seconds };
  timerInterval = setInterval(() => {
    timerState.secondsLeft--;
    updateTimerUI();
    if (timerState.secondsLeft <= 0) {
      clearInterval(timerInterval);
      timerState.active = false;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      updateTimerUI();
    }
  }, 1000);
  updateTimerUI();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerState = { active: false, secondsLeft: 0 };
  if (currentTimerKey) {
    const el = document.getElementById('itimer-' + currentTimerKey);
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
    currentTimerKey = null;
  }
}

function updateTimerUI() {
  if (!currentTimerKey) return;
  const el = document.getElementById('itimer-' + currentTimerKey);
  if (!el) return;
  el.style.display = 'block';
  if (!timerState.active && timerState.secondsLeft <= 0) {
    el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#14532d22;border:1px solid #22c55e44;border-radius:8px;margin-top:2px;"><span style="font-size:16px;">✅</span><span style="font-size:12px;font-weight:700;color:#22c55e;flex:1;">Riposo completato!</span><button onclick="stopTimer()" style="background:none;border:1px solid #22c55e55;color:#22c55e;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;">OK ✓</button></div>';
    return;
  }
  const m = Math.floor(timerState.secondsLeft / 60);
  const s = timerState.secondsLeft % 60;
  const timeStr = m > 0 ? m+':'+String(s).padStart(2,'0') : timerState.secondsLeft+'s';
  el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#ef444411;border:1px solid #ef444433;border-radius:8px;margin-top:2px;"><span style="font-size:22px;font-weight:900;font-family:\'Space Grotesk\',sans-serif;color:#ef4444;min-width:52px;">'+timeStr+'</span><span style="font-size:10px;color:#6b7280;flex:1;letter-spacing:1px;">RIPOSO</span><button onclick="event.stopPropagation();stopTimer()" style="background:none;border:1px solid #374151;color:#6b7280;padding:3px 8px;border-radius:5px;font-size:11px;">✕ salta</button></div>';
}

      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
        ${[{t:"Blocco A",c:"#22c55e"},{t:"45s🔴",c:"#ef4444"},{t:"Blocco B",c:"#3b82f6"},{t:"45s🔴",c:"#ef4444"},{t:"Blocco C",c:"#f97316"},{t:"2min⏸",c:"#a855f7"}]
          .map(i=>`<span style="font-size:9px;font-weight:800;color:${i.c};padding:2px 5px;background:${i.c}22;border-radius:4px;">${i.t}</span>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        ${[{c:"#22c55e",t:"GAMBE/PETTO"},{c:"#3b82f6",t:"SCHIENA/GAMBE"},{c:"#f97316",t:"CORE/FULL BODY"},{c:"#f97316",t:"ESPLOSIVITÀ"}]
          .map(l=>`<div style="display:flex;align-items:center;gap:4px;"><div style="width:6px;height:6px;border-radius:50%;background:${l.c};"></div><span style="font-size:9px;color:#374151;">${l.t}</span></div>`).join('')}
      </div>
    </div>
    ${buildGiornoSelector()}
    <div style="background:${g.colore}22;border:1px solid ${g.colore}44;border-radius:12px;padding:13px 15px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:16px;font-weight:900;">${g.nome}</div>
        <div style="font-size:12px;color:${g.colore};margin-top:2px;font-weight:600;">${g.focus}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:800;color:${g.colore};">⏱ ${g.durata}</div>
        <div style="font-size:10px;color:#6b7280;margin-top:2px;">${g.giri}</div>
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:2px;color:#374151;margin-bottom:10px;">SEQUENZA ESERCIZI</div>
    ${g.blocchi.map((blocco, bi) => {
      const bc = bloccoColori[blocco.id] || bloccoColori.A;
      const isUltimoB = bi === g.blocchi.length - 1;
      return `
      <div style="margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div style="background:${bc.label}22;border:1px solid ${bc.label}44;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:800;color:${bc.label};">${blocco.label}</div>
        </div>
        <div style="background:${bc.bg};border:1px solid ${bc.border};border-radius:12px;overflow:hidden;">
          ${blocco.esercizi.map((es, ei) => {
            esN++;
            const key = state.giorno+'-'+blocco.id+'-'+ei;
            const isAp = state.aperto === key;
            const isUltimoE = ei === blocco.esercizi.length - 1;
            const num = esN;
            return `
            <div>
              <button data-key="${key}" class="es-btn" style="width:100%;padding:13px 14px;background:none;border:none;border-bottom:${!isUltimoE?'1px solid '+bc.border:'none'};display:flex;align-items:center;gap:10px;text-align:left;">
                <div style="width:24px;height:24px;border-radius:6px;background:${bc.label}33;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:${bc.label};flex-shrink:0;">${num}</div>
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
                    <span style="font-size:13px;font-weight:700;color:#e2e8f0;">${es.nome}</span>
                    <span style="background:${es.tagC}22;color:${es.tagC};font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;flex-shrink:0;">${es.tag}</span>
                  </div>
                  <div style="font-size:10px;color:#374151;margin-bottom:4px;">${es.muscolo}</div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <span style="background:${bc.label};color:#000;font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;">${es.reps}</span>
                    ${isUltimoE
                      ? '<span style="font-size:10px;font-weight:700;color:'+(isUltimoB?'#a855f7':'#ef4444')+';">'+(isUltimoB?'→ ⏸ '+(g.recuperoMinLungo||'2 MIN'):'→ 🔴 '+(g.recuperoMin||'45 SEC'))+'</span><button onclick="event.stopPropagation();startTimer('+(isUltimoB?(g.recuperoLungo||120):(g.recupero||45))+',\''+key+'\')" style="margin-left:5px;background:'+(isUltimoB?'#a855f722':'#ef444422')+';border:1px solid '+(isUltimoB?'#a855f766':'#ef444466')+';color:'+(isUltimoB?'#a855f7':'#ef4444')+';font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;">▶</button>'
                      : '<span style="font-size:10px;color:#374151;">→ prossimo →</span>'}
                  </div>
                </div>
                <span style="color:${isAp?bc.label:'#374151'};font-size:13px;flex-shrink:0;">${isAp?'▲':'▼'}</span>
              </button>
              ${isAp ? `
              <div class="es-detail" style="padding:0 14px 14px;border-top:1px solid ${bc.border};">
                <div style="background:#0c0c0c;border-left:3px solid ${bc.label};border-radius:0 8px 8px 0;padding:10px 12px;margin-top:10px;">
                  <div style="font-size:9px;font-weight:800;color:${bc.label};letter-spacing:2px;margin-bottom:4px;">COME SI FA</div>
                  <div style="font-size:12px;color:#94a3b8;line-height:1.6;">${es.come}</div>
                </div>
                <div style="margin-top:10px;">
                  <div style="font-size:9px;font-weight:800;color:#3b82f6;letter-spacing:2px;margin-bottom:6px;">🔄 VARIANTI — esercizi alternativi</div>
                  ${es.alt.map(v=>`
                    <div style="background:#0c0c0c;border:1px solid ${bc.border};border-radius:8px;padding:10px 12px;margin-bottom:6px;">
                      <div style="font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:4px;">${v.nome}</div>
                      <div style="font-size:11px;color:#6b7280;line-height:1.5;">${v.come}</div>
                    </div>`).join('')}
                </div>
                <div style="background:#1a0f00;border:1px solid #78350f55;border-radius:8px;padding:10px 12px;margin-top:2px;display:flex;gap:10px;align-items:flex-start;">
                  <span style="font-size:16px;flex-shrink:0;">⚡</span>
                  <div>
                    <div style="font-size:9px;font-weight:800;color:#f59e0b;letter-spacing:2px;margin-bottom:3px;">SE NON RIESCI ANCORA</div>
                    <div style="font-size:11px;color:#fbbf24;line-height:1.5;">${es.semplificata}</div>
                  </div>
                </div>
              </div>` : ""}
              <div id="itimer-${key}" style="display:none;padding:0 10px 6px;"></div>
            </div>`;
          }).join('')}
        </div>
        ${!isUltimoB ? `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;margin-top:4px;">
          <div style="flex:1;height:1px;background:#ef444430;"></div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <span style="font-size:11px;font-weight:800;color:#ef4444;white-space:nowrap;">🔴 ${g.recuperoMin||"45 SEC"} RIPOSO</span>
            <button onclick="event.stopPropagation();startTimer(${g.recupero||45},'blk-${bi}')" style="background:#ef444422;border:1px solid #ef444466;color:#ef4444;font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;">▶ AVVIA</button>
          </div>
          <div style="flex:1;height:1px;background:#ef444430;"></div>
        </div>
        <div id="itimer-blk-${bi}" style="display:none;padding:0 4px 4px;"></div>` : ""}
      </div>`;
    }).join('')}
    <div style="background:#120a1e;border:1px solid #581c8766;border-radius:12px;padding:14px;margin-top:6px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <span style="font-size:28px;">⏸</span>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:900;color:#a855f7;">2 MINUTI DI RIPOSO</div>
          <div style="font-size:11px;color:#6b7280;margin-top:3px;">Poi ricomincia dall'esercizio 1 per il giro successivo</div>
        </div>
        <button onclick="startTimer(120,'lungo')" style="background:#a855f722;border:1px solid #a855f766;color:#a855f7;font-size:10px;font-weight:800;padding:7px 12px;border-radius:8px;flex-shrink:0;">▶ AVVIA</button>
      </div>
      <div id="itimer-lungo" style="display:none;margin-top:10px;"></div>
    </div>
    ${buildSettimana()}
    <div style="height:24px;"></div>
  </div>`;
}

function buildAttrezzi() {
  return `<div style="padding:16px 18px;">
    <div style="background:#0a1a0e;border:1px solid #16a34a44;border-radius:12px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:800;color:#22c55e;margin-bottom:4px;">💶 Budget extra stimato</div>
      <div style="font-size:24px;font-weight:900;">~20-35€</div>
      <div style="font-size:11px;color:#4b5563;margin-top:4px;">Solo per la sbarra da trazioni. Tutto il resto è già in casa o gratuito.</div>
    </div>
    ${attrezzi.map(a=>`
      <div style="background:#161616;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;">
        <div style="font-size:28px;flex-shrink:0;">${a.emoji}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div style="font-size:14px;font-weight:700;">${a.nome}</div>
            <div style="font-size:14px;font-weight:900;color:#22c55e;flex-shrink:0;margin-left:8px;">${a.prezzo}</div>
          </div>
          <div style="display:inline-block;background:#1f2937;font-size:9px;font-weight:700;color:#6b7280;padding:2px 8px;border-radius:4px;margin-top:5px;">${a.quando}</div>
          <div style="font-size:11px;color:#4b5563;margin-top:6px;line-height:1.5;">${a.perche}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function buildCibo() {
  return `<div style="padding:16px 18px;">
    <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:14px;">
      <div style="font-size:10px;font-weight:800;color:#6b7280;letter-spacing:2px;margin-bottom:12px;">OBIETTIVI GIORNALIERI — MASSA + RESISTENZA CALCIO</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${[{label:"Calorie",val:"2.900–3.200",unit:"kcal/giorno",colore:"#22c55e",note:"Surplus moderato per costruire massa senza ingrassare"},
           {label:"Proteine",val:"140–160",unit:"g/giorno",colore:"#f97316",note:"2g/kg — ricostruzione muscolare massima"},
           {label:"Carboidrati",val:"380–430",unit:"g/giorno",colore:"#3b82f6",note:"Alto: il carburante per correre e allenarsi"},
           {label:"Grassi",val:"80–100",unit:"g/giorno",colore:"#a855f7",note:"Olio oliva, pesce, frutta secca, uova"}]
          .map(m=>`
          <div style="background:#0c0c0c;border:1px solid ${m.colore}33;border-radius:10px;padding:12px;">
            <div style="font-size:10px;color:#4b5563;margin-bottom:4px;">${m.label}</div>
            <div style="font-size:16px;font-weight:900;color:${m.colore};">${m.val}</div>
            <div style="font-size:10px;color:#374151;margin-top:2px;">${m.unit}</div>
            <div style="font-size:10px;color:#374151;margin-top:5px;line-height:1.4;">${m.note}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:2px;color:#374151;margin-bottom:10px;">IDEE PER OGNI PASTO — tocca per aprire</div>
    ${pasti.map((p,pi)=>{
      const isAp = state.pasto === pi;
      return `
      <div style="background:#161616;border:1px solid ${isAp?p.colore+"66":"#1f2937"};border-radius:12px;margin-bottom:8px;overflow:hidden;">
        <button data-pasto="${pi}" style="width:100%;padding:14px 16px;background:none;border:none;display:flex;align-items:center;gap:12px;text-align:left;">
          <div style="width:40px;height:40px;border-radius:10px;background:${p.colore}22;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${p.emoji}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:800;color:#f1f5f9;">${p.pasto}</div>
            <div style="font-size:11px;color:#4b5563;margin-top:2px;">⏰ ${p.orario}</div>
          </div>
          <span style="color:${isAp?p.colore:"#374151"};font-size:14px;flex-shrink:0;">${isAp?"▲":"▼"}</span>
        </button>
        ${isAp ? `
        <div style="padding:0 16px 14px;border-top:1px solid #1f2937;">
          <div style="font-size:9px;font-weight:800;color:#374151;letter-spacing:2px;margin:12px 0 8px;">3 IDEE — scegli quella che hai in casa</div>
          ${p.idee.map(idea=>`
            <div style="background:#0c0c0c;border:1px solid ${p.colore}33;border-radius:10px;padding:12px;margin-bottom:6px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <div style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1;">${idea.nome}</div>
                <span style="background:${p.colore}22;color:${p.colore};font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;flex-shrink:0;">${idea.macro}</span>
              </div>
              <div style="font-size:11px;color:#4b5563;margin-top:6px;line-height:1.4;">${idea.note}</div>
            </div>`).join('')}
        </div>` : ""}
      </div>`;
    }).join('')}
    <div style="background:#0a1f14;border:1px solid #14532d55;border-radius:12px;padding:14px;margin-top:4px;">
      <div style="font-size:10px;font-weight:800;color:#22c55e;letter-spacing:1px;margin-bottom:8px;">📌 LE 3 REGOLE PER MASSA + PRESTAZIONE CALCIO</div>
      ${["Mangia PRIMA di allenarti — almeno 60 min prima. Il glicogeno muscolare è il carburante degli sprint. Stomaco vuoto = prestazione dimezzata.",
         "Proteine entro 30 min dal fine allenamento — questa è la finestra anabolica. Yogurt greco, latte, ricotta. Non saltarla mai.",
         "Carboidrati alti nei giorni di corsa — il long run del sabato brucia 500-700 kcal. Compensa aggiungendo una porzione extra di pasta o riso."]
        .map((r,i)=>`
        <div style="display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:${i<2?"1px solid #1f2937":"none"};">
          <span style="color:#22c55e;font-size:12px;flex-shrink:0;margin-top:1px;">✓</span>
          <span style="font-size:11px;color:#4b5563;line-height:1.5;">${r}</span>
        </div>`).join('')}
    </div>
    <div style="height:24px;"></div>
  </div>`;
}

function attachEvents() {
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>setState({tab:b.dataset.tab,aperto:null,pasto:null}));
  document.querySelectorAll('[data-giorno]').forEach(b=>b.onclick=()=>setState({giorno:parseInt(b.dataset.giorno),aperto:null}));
  document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>setState({aperto:state.aperto===b.dataset.key?null:b.dataset.key}));
  document.querySelectorAll('[data-pasto]').forEach(b=>b.onclick=()=>setState({pasto:state.pasto===parseInt(b.dataset.pasto)?null:parseInt(b.dataset.pasto)}));
}

render();
</script>
</body>
</html>
