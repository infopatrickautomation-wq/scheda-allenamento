<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;900&display=swap" rel="stylesheet">
<style>
html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; }
* { box-sizing:border-box; }
.deck-viewport { position:fixed; inset:0; overflow:hidden; }
.deck-stage { position:absolute; left:0; top:0; width:1920px; height:1080px; overflow:hidden; transform-origin:0 0; background:#000;
  font-family:'Barlow Condensed',sans-serif; }
.slide { position:absolute; inset:0; width:1920px; height:1080px; overflow:hidden;
         visibility:hidden; opacity:0; pointer-events:none; transition:opacity 0.4s; }
.slide.active { visibility:visible; opacity:1; pointer-events:auto; }

/* SLIDE 1 */
.s1 { background:#000; }
.s1 .topbar { position:absolute; top:60px; left:80px; font-weight:400; font-size:18px;
  letter-spacing:0.3em; color:rgba(255,255,255,0.3); text-transform:uppercase; }
.s1 .center { position:absolute; top:50%; left:80px; transform:translateY(-50%); }
.s1 .big { font-weight:900; font-size:280px; line-height:0.85; text-transform:uppercase; margin:0; }
.s1 .w { color:#fff; } .s1 .o { color:#FA5400; }
.s1 .tag { margin-top:42px; font-weight:400; font-size:22px; letter-spacing:0.2em;
  color:rgba(255,255,255,0.4); text-transform:uppercase; }
.s1 .swoosh { position:absolute; bottom:80px; right:90px; }

.slideIn { transform:translateX(-80px); opacity:0; }
.slide.active .slideIn { animation:slideIn 0.7s cubic-bezier(.16,1,.3,1) forwards; }
.slide.active .i0{animation-delay:.05s} .slide.active .i1{animation-delay:.15s}
.slide.active .i2{animation-delay:.3s} .slide.active .i3{animation-delay:.45s}
@keyframes slideIn { to{transform:translateX(0); opacity:1;} }

/* SLIDE 2 */
.s2 { background:#fff; display:flex; flex-direction:column; }
.s2 .hline { height:2px; background:#000; }
.s2 .head { padding:30px 0; text-align:center; font-weight:400; font-size:16px;
  letter-spacing:0.3em; color:#000; text-transform:uppercase; }
.s2 .cols { flex:1; display:flex; }
.s2 .col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.s2 .col + .col { border-left:1px solid rgba(17,17,17,0.1); }
.s2 .num { font-weight:900; font-size:140px; line-height:0.9; color:#000; }
.s2 .num.acc { color:#FA5400; }
.s2 .cap { margin-top:18px; font-weight:400; font-size:20px; letter-spacing:0.12em;
  color:rgba(0,0,0,0.5); text-transform:uppercase; }
.s2 .foot { padding:34px 0; text-align:center; font-weight:400; font-size:14px;
  letter-spacing:0.4em; color:rgba(0,0,0,0.3); text-transform:uppercase; }

.popUp { opacity:0; transform:translateY(24px); }
.slide.active .popUp { animation:popUp 0.7s cubic-bezier(.16,1,.3,1) forwards; }
.slide.active .p0{animation-delay:.1s} .slide.active .p1{animation-delay:.25s} .slide.active .p2{animation-delay:.4s}
@keyframes popUp { to{opacity:1; transform:translateY(0);} }

/* SLIDE 3 */
.s3 { background:#FA5400; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.s3 .label { font-weight:400; font-size:24px; letter-spacing:0.3em; color:rgba(255,255,255,0.7);
  text-transform:uppercase; margin-bottom:30px; }
.s3 .big { font-weight:900; font-size:200px; line-height:0.9; color:#fff; text-transform:uppercase; margin:0; }
.s3 .sub { margin-top:34px; font-weight:400; font-size:30px; letter-spacing:0.2em; color:rgba(255,255,255,0.6); }
.s3 .swoosh { position:absolute; bottom:90px; }
.scaleIn { opacity:0; transform:scale(0.8); }
.slide.active .scaleIn { animation:scaleIn 0.7s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes scaleIn { to{opacity:1; transform:scale(1);} }
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">

    <!-- SLIDE 1 -->
    <section class="slide s1">
      <div class="topbar slideIn i0">PatrickAutomation &mdash; Automation Agency</div>
      <div class="center">
        <h1 class="big w slideIn i1">JUST</h1>
        <h1 class="big o slideIn i2">AUTOMATE.</h1>
        <div class="tag slideIn i3">Quando smetti di farlo a mano, cominci a scalare.</div>
      </div>
      <div class="swoosh slideIn i3">
        <svg width="120" height="80" viewBox="0 0 120 80" fill="none">
          <path d="M0,60 C30,60 90,-20 120,10 C100,20 60,50 30,70 Z" fill="#FA5400"/>
        </svg>
      </div>
    </section>

    <!-- SLIDE 2 -->
    <section class="slide s2">
      <div class="hline"></div>
      <div class="head">Risultati reali &mdash; Verificati &mdash; 2026</div>
      <div class="hline"></div>
      <div class="cols">
        <div class="col popUp p0"><div class="num">+340%</div><div class="cap">Lead in 60 giorni</div></div>
        <div class="col popUp p1"><div class="num">12H</div><div class="cap">Risparmiate a settimana</div></div>
        <div class="col popUp p2"><div class="num acc">24/7</div><div class="cap">Attivo senza pausa</div></div>
      </div>
      <div class="foot">PatrickAutomation.com</div>
    </section>

    <!-- SLIDE 3 -->
    <section class="slide s3">
      <div class="label scaleIn">Vuoi questi risultati?</div>
      <h1 class="big scaleIn">Facciamolo.</h1>
      <div class="sub scaleIn">patrickautomation.com</div>
      <div class="swoosh scaleIn">
        <svg width="160" height="100" viewBox="0 0 120 80" fill="none">
          <path d="M0,60 C30,60 90,-20 120,10 C100,20 60,50 30,70 Z" fill="#fff"/>
        </svg>
      </div>
    </section>

  </div>
</div>
<script>
(function(){
  function fit(){
    var s=document.getElementById('stage');
    var vw=window.innerWidth,vh=window.innerHeight;
    var sc=Math.min(vw/1920,vh/1080);
    s.style.transform='translate('+((vw-1920*sc)/2)+'px,'+((vh-1080*sc)/2)+'px) scale('+sc+')';
  }
  fit(); window.addEventListener('resize',fit);
})();
var slides=document.querySelectorAll('.slide');
var cur=0;
function show(n){
  slides[cur].classList.remove('active');
  cur=(n+slides.length)%slides.length;
  slides[cur].classList.add('active');
}
slides[0].classList.add('active');
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')show(cur+1);
  if(e.key==='ArrowLeft')show(cur-1);
});
</script>
</body>
</html>
