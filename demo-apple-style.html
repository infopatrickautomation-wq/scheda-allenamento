<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatrickAI — Apple Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#0071e3; --ink:#1d1d1f; --grey:#86868b; }
  *{box-sizing:border-box;}
  html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#fff; }
  .deck-viewport { position:fixed; inset:0; overflow:hidden; background:#e9e9ec; }
  .deck-stage { position:absolute; left:0; top:0; width:1920px; height:1080px; overflow:hidden; transform-origin:0 0;
    background:#FFFFFF; color:var(--ink); font-family:'DM Sans',-apple-system,sans-serif; }

  .content{position:absolute; inset:0; display:flex; align-items:center; padding:0 160px; gap:120px;}
  .left{flex:1.1;}
  .right{flex:.9; display:flex; align-items:center; justify-content:center;}

  .tag{font-size:21px; font-weight:600; letter-spacing:.18em; color:var(--accent);
    text-transform:uppercase; margin-bottom:34px;
    opacity:0; transform:translateY(12px); animation:rise .8s .2s cubic-bezier(.22,1,.36,1) forwards;}

  h1{font-weight:300; font-size:104px; line-height:1.05; letter-spacing:-.025em; margin:0 0 40px;
    color:var(--ink);}
  h1 .a{display:block; opacity:0; transform:translateY(24px);}
  h1 .a:nth-child(1){animation:rise .9s .4s cubic-bezier(.22,1,.36,1) forwards;}
  h1 .a:nth-child(2){animation:rise .9s .58s cubic-bezier(.22,1,.36,1) forwards; font-weight:500;}

  .desc{font-size:28px; font-weight:400; line-height:1.5; color:var(--grey); max-width:560px;
    margin:0 0 56px; opacity:0; transform:translateY(16px);
    animation:rise .9s .8s cubic-bezier(.22,1,.36,1) forwards;}

  .cta{display:inline-flex; align-items:center; gap:14px; background:var(--accent); color:#fff;
    font-size:24px; font-weight:500; padding:20px 40px; border-radius:980px; cursor:pointer;
    opacity:0; transform:translateY(14px); animation:rise .9s 1s cubic-bezier(.22,1,.36,1) forwards;
    box-shadow:0 8px 30px rgba(0,113,227,.30);}
  .cta .arr{font-size:26px; transition:transform .3s;}

  /* iPhone mockup */
  .phone{width:430px; height:880px; background:#0a0a0c; border-radius:62px; padding:16px;
    box-shadow:0 50px 120px rgba(0,0,0,.22), 0 8px 24px rgba(0,0,0,.10);
    position:relative; opacity:0; transform:translateY(50px) scale(.96);
    animation:phoneIn 1.1s .55s cubic-bezier(.22,1,.36,1) forwards;}
  .phone::after{content:''; position:absolute; top:30px; left:50%; transform:translateX(-50%);
    width:128px; height:34px; background:#0a0a0c; border-radius:20px; z-index:5;}
  .screen{width:100%; height:100%; border-radius:48px; overflow:hidden;
    background:linear-gradient(180deg,#f6f7fb 0%,#eef1f8 100%); position:relative;
    display:flex; flex-direction:column; padding:78px 30px 40px;}
  .screen .stime{font-size:19px; font-weight:600; color:var(--ink); margin-bottom:30px; padding-left:6px;}
  .screen .ttl{font-size:30px; font-weight:700; color:var(--ink); margin-bottom:6px; padding-left:6px; letter-spacing:-.01em;}
  .screen .day{font-size:17px; color:var(--grey); margin-bottom:28px; padding-left:6px;}

  .uicard{background:#fff; border-radius:24px; padding:26px 26px; margin-bottom:18px;
    box-shadow:0 6px 20px rgba(20,30,60,.06); opacity:0; transform:translateX(28px);}
  .uicard.c1{animation:cardIn .8s 1.25s cubic-bezier(.22,1,.36,1) forwards;}
  .uicard.c2{animation:cardIn .8s 1.45s cubic-bezier(.22,1,.36,1) forwards;}
  .uicard .row{display:flex; align-items:center; gap:16px;}
  .uicard .ic{width:46px; height:46px; border-radius:13px; display:flex; align-items:center;
    justify-content:center; font-size:23px; flex-shrink:0;}
  .ic.green{background:#e3f7ea;} .ic.blue{background:#e6f0fe;}
  .uicard .meta .big{font-size:24px; font-weight:700; color:var(--ink); line-height:1.1;}
  .uicard .meta .small{font-size:16px; color:var(--grey); margin-top:3px;}
  .pulse{margin-left:auto; width:11px; height:11px; border-radius:50%; background:#34c759;
    box-shadow:0 0 0 0 rgba(52,199,89,.5); animation:pulse 2s infinite;}

  @keyframes rise{to{opacity:1; transform:translateY(0);}}
  @keyframes phoneIn{to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes cardIn{to{opacity:1; transform:translateX(0);}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,199,89,.5);}70%{box-shadow:0 0 0 14px rgba(52,199,89,0);}100%{box-shadow:0 0 0 0 rgba(52,199,89,0);}}
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">
    <div class="content">
      <div class="left">
        <div class="tag">Disponibile ora</div>
        <h1>
          <span class="a">Il tuo agente,</span>
          <span class="a">sempre con te.</span>
        </h1>
        <p class="desc">Lead, follow-up e report nel palmo della mano. Il tuo business che lavora, anche quando tu non lo fai.</p>
        <div class="cta">Scopri di più <span class="arr">&rarr;</span></div>
      </div>
      <div class="right">
        <div class="phone">
          <div class="screen">
            <div class="stime">9:41</div>
            <div class="ttl">Buongiorno, Patrick</div>
            <div class="day">Mercoledì 10 giugno</div>
            <div class="uicard c1">
              <div class="row">
                <div class="ic green">&#128229;</div>
                <div class="meta">
                  <div class="big">3 lead catturati oggi</div>
                  <div class="small">+1 rispetto a ieri</div>
                </div>
                <div class="pulse"></div>
              </div>
            </div>
            <div class="uicard c2">
              <div class="row">
                <div class="ic blue">&#10004;</div>
                <div class="meta">
                  <div class="big">+2 follow-up inviati</div>
                  <div class="small">Tutti consegnati</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  function fit(){
    var s=document.getElementById('stage');
    var vw=window.innerWidth,vh=window.innerHeight;
    var sc=Math.min(vw/1920,vh/1080);
    var ox=(vw-1920*sc)/2,oy=(vh-1080*sc)/2;
    s.style.transform='translate('+ox+'px,'+oy+'px) scale('+sc+')';
  }
  fit(); window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
