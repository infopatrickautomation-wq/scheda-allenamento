<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatrickAI — Figma Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --figma:#5551FF; --ink:#0d0d0d; --grey:#6b6b6b; }
  *{box-sizing:border-box;}
  html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#fff; }
  .deck-viewport { position:fixed; inset:0; overflow:hidden; background:#e8e8ec; }
  .deck-stage { position:absolute; left:0; top:0; width:1920px; height:1080px; overflow:hidden; transform-origin:0 0;
    background:#F5F5F5; color:var(--ink); font-family:'Space Grotesk',sans-serif; }

  .badge{position:absolute; top:64px; right:90px; font-size:16px; font-weight:600;
    letter-spacing:.14em; color:var(--figma); border:1.5px solid var(--figma); border-radius:980px;
    padding:11px 24px; text-transform:uppercase; opacity:0; transform:translateY(-10px);
    animation:rise .7s .2s cubic-bezier(.22,1,.36,1) forwards;}

  .content{position:absolute; inset:0; display:flex; align-items:center; padding:0 120px; gap:90px;}
  .left{flex:1;}
  .right{flex:1.05; display:flex; align-items:center; justify-content:center;}

  .eyebrow{font-size:18px; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    color:var(--grey); margin-bottom:30px; opacity:0; transform:translateY(12px);
    animation:rise .8s .3s cubic-bezier(.22,1,.36,1) forwards;}
  .eyebrow .dotf{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--figma); margin-right:12px; vertical-align:middle;}

  h1{font-family:'Syne',sans-serif; font-weight:800; font-size:104px; line-height:1.0;
    letter-spacing:-.03em; margin:0 0 38px; max-width:760px;}
  h1 .a{display:block; opacity:0; transform:translateY(26px);}
  h1 .a:nth-child(1){animation:rise .9s .45s cubic-bezier(.22,1,.36,1) forwards;}
  h1 .a:nth-child(2){animation:rise .9s .62s cubic-bezier(.22,1,.36,1) forwards;}
  h1 .purp{color:var(--figma);}

  .desc{font-size:26px; line-height:1.55; color:var(--grey); max-width:520px; margin:0 0 50px;
    opacity:0; transform:translateY(16px); animation:rise .9s .82s cubic-bezier(.22,1,.36,1) forwards;}

  .cta{display:inline-flex; align-items:center; gap:14px; background:var(--figma); color:#fff;
    font-family:'Syne',sans-serif; font-size:23px; font-weight:700; padding:20px 42px; border-radius:14px;
    cursor:pointer; opacity:0; transform:translateY(14px);
    animation:rise .9s 1s cubic-bezier(.22,1,.36,1) forwards; box-shadow:0 12px 34px rgba(85,81,255,.30);}

  /* Figma window mock */
  .fig{width:880px; height:600px; background:#fff; border-radius:18px; overflow:hidden;
    box-shadow:0 40px 100px rgba(20,20,40,.18), 0 6px 18px rgba(0,0,0,.06);
    display:flex; flex-direction:column; opacity:0; transform:translateY(46px) scale(.97);
    animation:figIn 1.1s .6s cubic-bezier(.22,1,.36,1) forwards;}
  .fig .topbar{height:56px; background:#2c2c2c; display:flex; align-items:center; gap:10px; padding:0 22px; flex-shrink:0;}
  .fig .topbar .dotr{width:13px;height:13px;border-radius:50%;}
  .d1{background:#ff5f57;}.d2{background:#febc2e;}.d3{background:#28c840;}
  .fig .topbar .ttl{margin-left:18px; color:#bdbdbd; font-size:16px; font-weight:500;}
  .fig .body{flex:1; display:flex;}
  .fig .layers{width:230px; background:#fafafa; border-right:1px solid #ececec; padding:20px 16px;}
  .fig .layers .lh{font-size:13px; font-weight:600; letter-spacing:.12em; color:#9a9a9a; text-transform:uppercase; margin-bottom:16px;}
  .fig .layers .ly{display:flex; align-items:center; gap:11px; font-size:16px; color:#444; padding:9px 10px; border-radius:8px; margin-bottom:3px;}
  .fig .layers .ly.sel{background:#ecebff; color:var(--figma); font-weight:600;}
  .fig .layers .ly .sq{width:15px; height:15px; border-radius:3px; border:2px solid currentColor;}
  .fig .canvas{flex:1; background:#f0f0f3; position:relative;
    background-image:radial-gradient(#d8d8de 1.3px, transparent 1.3px); background-size:26px 26px;}
  .rect{position:absolute; border-radius:12px;}
  .r1{width:230px; height:130px; background:#fff; border:2px solid #e3e3e8; top:80px; left:80px; box-shadow:0 8px 22px rgba(0,0,0,.05);}
  .r2{width:170px; height:170px; background:linear-gradient(135deg,#6c68ff,#5551ff); top:250px; left:200px;
    box-shadow:0 14px 34px rgba(85,81,255,.32); outline:2px solid var(--figma); outline-offset:5px;}
  .r2 .agentbadge{position:absolute; top:-18px; left:-2px; background:var(--figma); color:#fff;
    font-family:'Syne',sans-serif; font-weight:700; font-size:14px; padding:5px 14px; border-radius:7px; white-space:nowrap;}
  .r3{width:140px; height:90px; background:#fff; border:2px solid #e3e3e8; top:120px; left:360px; box-shadow:0 8px 22px rgba(0,0,0,.05);}
  .cursor{position:absolute; top:300px; left:340px; z-index:6; font-size:0; opacity:0;
    animation:curIn .5s 1.6s forwards;}
  .cursor svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .cursor .clbl{position:absolute; top:22px; left:14px; background:var(--figma); color:#fff;
    font-size:13px; font-weight:600; padding:3px 10px; border-radius:6px; white-space:nowrap;}

  .dots{position:absolute; bottom:54px; left:50%; transform:translateX(-50%); display:flex; gap:12px;
    opacity:0; animation:rise .8s 1.3s forwards;}
  .dots i{width:11px; height:11px; border-radius:50%; background:#cfcfd6; display:block;}
  .dots i.on{width:34px; border-radius:6px; background:var(--figma);}

  @keyframes rise{to{opacity:1; transform:translateY(0);}}
  @keyframes figIn{to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes curIn{to{opacity:1; font-size:1px;}}
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">
    <div class="badge">Config 2026 · Keynote</div>
    <div class="content">
      <div class="left">
        <div class="eyebrow"><span class="dotf"></span>PatrickAI · Design Ops</div>
        <h1>
          <span class="a">Il tuo secondo</span>
          <span class="a"><span class="purp">cursore.</span> Intelligente.</span>
        </h1>
        <p class="desc">L'agente che disegna, automatizza e itera al tuo fianco. Tu pensi, lui esegue — sullo stesso canvas.</p>
        <div class="cta">Prova l'agente</div>
      </div>
      <div class="right">
        <div class="fig">
          <div class="topbar">
            <span class="dotr d1"></span><span class="dotr d2"></span><span class="dotr d3"></span>
            <span class="ttl">PatrickAI · Flow.fig</span>
          </div>
          <div class="body">
            <div class="layers">
              <div class="lh">Layers</div>
              <div class="ly"><span class="sq"></span>Frame · Hero</div>
              <div class="ly"><span class="sq"></span>Lead Card</div>
              <div class="ly sel"><span class="sq"></span>Agent Block</div>
              <div class="ly"><span class="sq"></span>Report Tile</div>
            </div>
            <div class="canvas">
              <div class="rect r1"></div>
              <div class="rect r3"></div>
              <div class="rect r2"><span class="agentbadge">Agent</span></div>
              <div class="cursor">
                <svg width="26" height="26" viewBox="0 0 24 24"><path d="M3 2l16 7-6.5 2.5L9 19 3 2z" fill="#5551FF"/></svg>
                <span class="clbl">PatrickAI</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="dots">
      <i></i><i class="on"></i><i></i><i></i>
    </div>
  </div>
</div>
<script>
(function(){
  function fit(){
    var s=document.getElementById('stage');
    var vw=window.innerWidth,vh=window.innerHeight;
    var sc=Math.min(vw/1920,vh/1080);
    var ox=(vw-1920*sc)/2,oy=(vh-1080*sc)/2;
    s.style.transform='translate('+ox+'px,'+oy+'px) scale('+sc+')';
  }
  fit(); window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
