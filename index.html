<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0c0c0c; color: #fff; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  button { cursor: pointer; font-family: inherit; }
  .tag-pill { display: inline-block; background: #1f2937; font-size: 10px; padding: 3px 10px; border-radius: 20px; color: #6b7280; }
  .section-label { font-size: 9px; letter-spacing: 2px; color: #374151; margin-bottom: 8px; text-transform: uppercase; }
  .card { background: #161616; border: 1px solid #1f2937; border-radius: 12px; }
  .divider { height: 1px; background: #0c0c0c; }

  /* Transitions card apertura */
  .es-detail {
    animation: slideDown 0.25s ease-out;
    overflow: hidden;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Tab transition */
  .tab-content {
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  /* Button press */
  button:active { transform: scale(0.97); }
  /* Card hover (desktop) */
  @media (hover: hover) {
    .es-btn:hover { background: rgba(255,255,255,0.03) !important; }
  }
  /* Giorno button hover */
  .giorno-btn { transition: all 0.18s ease; }
  .giorno-btn:hover { transform: translateY(-2px); }
</style>

let state = { tab:"circuito", giorno:0, aperto:null, pasto:null };

// ─── TIMER ────────────────────────────────────────────────────────────────────
let timerInterval = null;
let timerState = { active: false, secondsLeft: 0, type: '' };

function startTimer(seconds, type) {
  if (timerInterval) clearInterval(timerInterval);
  timerState = { active: true, secondsLeft: seconds, type };
  timerInterval = setInterval(() => {
    timerState.secondsLeft--;
    updateTimerUI();
    if (timerState.secondsLeft <= 0) {
      clearInterval(timerInterval);
      timerState.active = false;
      // vibration feedback se disponibile
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      updateTimerUI();
    }
  }, 1000);
  updateTimerUI();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerState = { active: false, secondsLeft: 0, type: '' };
  const el = document.getElementById('timer-bar');
  if (el) el.style.display = 'none';
}

function updateTimerUI() {
  const el = document.getElementById('timer-bar');
  if (!el) return;
  if (!timerState.active && timerState.secondsLeft <= 0) {
    el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;background:#14532d;border-radius:10px;">
      <span style="font-size:20px;">✅</span>
      <span style="font-size:14px;font-weight:700;color:#22c55e;">Riposo completato!</span>
      <button onclick="stopTimer()" style="background:#22c55e22;border:none;color:#22c55e;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;">OK</button>
    </div>`;
    return;
  }
  const m = Math.floor(timerState.secondsLeft / 60);
  const s = timerState.secondsLeft % 60;
  const timeStr = m > 0 ? `${m}:${s.toString().padStart(2,'0')}` : `${s}s`;
  const color = timerState.type === 'lungo' ? '#a855f7' : '#ef4444';
  const label = timerState.type === 'lungo' ? '⏸ RIPOSO GIRO' : '🔴 RIPOSO BLOCCO';
  el.style.display = 'block';
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:${color}22;border:1px solid ${color}44;border-radius:10px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:13px;font-weight:800;color:${color};">${label}</span>
      <span style="font-size:22px;font-weight:900;color:${color};font-family:'Space Grotesk',sans-serif;">${timeStr}</span>
    </div>
    <button onclick="stopTimer()" style="background:${color}33;border:none;color:${color};font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;">✕ SALTA</button>
  </div>`;
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

          `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:${i<6?"1px solid #0c0c0c":"none"};background:${r.attivo?r.c+"0a":"transparent"};">
            <div style="width:34px;height:34px;border-radius:8px;background:${r.attivo?r.c+"22":"#0c0c0c"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-size:15px;">${r.emoji}</span>
            </div>
            <div style="flex:1;">
              <span style="font-size:11px;font-weight:800;color:${r.attivo?r.c:"#1f2937"};">${r.tag}  </span>
              <span style="font-size:11px;color:${r.attivo?"#6b7280":"#1f2937"};">— ${r.tipo}</span>
            </div>
            ${r.attivo?`<span style="background:${r.c}22;color:${r.c};font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;">ALLENA</span>`:""}
          </div>`).join('')}
      </div>
    </div>
    <div style="height:24px;"></div>
  </div>`;
}

function buildAttrezzi() {
  return `<div style="padding:16px 18px;">
    <div style="background:#0a1f14;border:1px solid #14532d55;border-radius:12px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:800;color:#22c55e;margin-bottom:4px;">💶 Budget extra da spendere</div>
      <div style="font-size:24px;font-weight:900;">~25€</div>
      <div style="font-size:11px;color:#4b5563;margin-top:4px;">I manubri li hai già. Servono solo tappetino e corda per iniziare subito.</div>
    </div>
    ${attrezzi.map(a=>`
      <div style="background:#161616;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;">
        <div style="font-size:28px;flex-shrink:0;">${a.emoji}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div style="font-size:14px;font-weight:700;">${a.nome}</div>
            <div style="font-size:14px;font-weight:900;color:#22c55e;flex-shrink:0;margin-left:8px;">${a.prezzo}</div>
          </div>
          <div style="display:inline-block;background:#1f2937;font-size:9px;font-weight:700;color:#6b7280;padding:2px 8px;border-radius:4px;margin-top:5px;">${a.quando}</div>
          <div style="font-size:11px;color:#4b5563;margin-top:6px;line-height:1.5;">${a.perche}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function buildCibo() {
  return `<div style="padding:16px 18px;">
    <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:14px;">
      <div style="font-size:10px;font-weight:800;color:#6b7280;letter-spacing:2px;margin-bottom:12px;">OBIETTIVI GIORNALIERI INDICATIVI</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${[{label:"Calorie",val:"2.500–2.700",unit:"kcal/giorno",colore:"#f59e0b",note:"Leggero surplus per costruire muscolo"},
           {label:"Proteine",val:"140–160",unit:"g/giorno",colore:"#22c55e",note:"~2g per kg di peso corporeo"},
           {label:"Carboidrati",val:"280–330",unit:"g/giorno",colore:"#3b82f6",note:"Energia per gli allenamenti"},
           {label:"Grassi",val:"70–90",unit:"g/giorno",colore:"#f97316",note:"Olio oliva, uova, frutta secca"}]
          .map(m=>`
          <div style="background:#0c0c0c;border:1px solid ${m.colore}33;border-radius:10px;padding:12px;">
            <div style="font-size:10px;color:#4b5563;margin-bottom:4px;">${m.label}</div>
            <div style="font-size:18px;font-weight:900;color:${m.colore};">${m.val}</div>
            <div style="font-size:10px;color:#374151;margin-top:2px;">${m.unit}</div>
            <div style="font-size:10px;color:#374151;margin-top:5px;line-height:1.4;">${m.note}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:2px;color:#374151;margin-bottom:10px;">IDEE PER OGNI PASTO — tocca per aprire</div>
    ${pasti.map((p,pi)=>{
      const isAp = state.pasto === pi;
      return `
      <div style="background:#161616;border:1px solid ${isAp?p.colore+"66":"#1f2937"};border-radius:12px;margin-bottom:8px;overflow:hidden;">
        <button data-pasto="${pi}" style="width:100%;padding:14px 16px;background:none;border:none;display:flex;align-items:center;gap:12px;text-align:left;">
          <div style="width:40px;height:40px;border-radius:10px;background:${p.colore}22;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${p.emoji}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:800;color:#f1f5f9;">${p.pasto}</div>
            <div style="font-size:11px;color:#4b5563;margin-top:2px;">⏰ ${p.orario}</div>
          </div>
          <span style="color:${isAp?p.colore:"#374151"};font-size:14px;flex-shrink:0;">${isAp?"▲":"▼"}</span>
        </button>
        ${isAp ? `
        <div style="padding:0 16px 14px;border-top:1px solid #1f2937;">
          <div style="font-size:9px;font-weight:800;color:#374151;letter-spacing:2px;margin:12px 0 8px;">3 IDEE — scegli quella che hai in casa</div>
          ${p.idee.map(idea=>`
            <div style="background:#0c0c0c;border:1px solid ${p.colore}33;border-radius:10px;padding:12px;margin-bottom:6px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <div style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1;">${idea.nome}</div>
                <span style="background:${p.colore}22;color:${p.colore};font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;flex-shrink:0;">${idea.macro}</span>
              </div>
              <div style="font-size:11px;color:#4b5563;margin-top:6px;line-height:1.4;">${idea.note}</div>
            </div>`).join('')}
        </div>` : ""}
      </div>`;
    }).join('')}
    <div style="background:#0a1f14;border:1px solid #14532d55;border-radius:12px;padding:14px;margin-top:4px;">
      <div style="font-size:10px;font-weight:800;color:#22c55e;letter-spacing:1px;margin-bottom:8px;">📌 LE 3 REGOLE BASE</div>
      ${["Mangia proteine ad ogni pasto — uova, carne, pesce, yogurt greco, ricotta, legumi",
         "Non saltare i pasti — il muscolo cresce se dai abbastanza carburante al corpo",
         "Bevi almeno 2 litri d'acqua al giorno — soprattutto nei giorni di allenamento"]
        .map((r,i)=>`
        <div style="display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:${i<2?"1px solid #1f2937":"none"};">
          <span style="color:#22c55e;font-size:12px;flex-shrink:0;margin-top:1px;">✓</span>
          <span style="font-size:11px;color:#4b5563;line-height:1.5;">${r}</span>
        </div>`).join('')}
    </div>
    <div style="height:24px;"></div>
  </div>`;
}

function attachEvents() {
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.onclick = () => setState({ tab: btn.dataset.tab, aperto: null, pasto: null });
  });
  document.querySelectorAll('[data-giorno]').forEach(btn => {
    btn.onclick = () => setState({ giorno: parseInt(btn.dataset.giorno), aperto: null });
  });
  document.querySelectorAll('[data-key]').forEach(btn => {
    btn.onclick = () => setState({ aperto: state.aperto === btn.dataset.key ? null : btn.dataset.key });
  });
  document.querySelectorAll('[data-pasto]').forEach(btn => {
    btn.onclick = () => setState({ pasto: state.pasto === parseInt(btn.dataset.pasto) ? null : parseInt(btn.dataset.pasto) });
  });
}

render();
</script>
</body>
</html>
